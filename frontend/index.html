<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>abivio — Bald verfügbar</title>
  <meta name="description" content="abivio hilft Abiturienten in Deutschland, das passende Studium zu finden. Bald verfügbar.">
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    .construction-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      background: linear-gradient(180deg, var(--color-accent) 0%, var(--color-bg) 100%);
    }
    .construction-logo {
      height: 64px;
      width: auto;
      margin-bottom: 2rem;
    }
    .construction-icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
    }
    .construction-page h1 {
      font-size: clamp(1.75rem, 5vw, 2.5rem);
      margin-bottom: 1rem;
      max-width: 600px;
    }
    .construction-page p {
      font-size: 1.15rem;
      color: var(--color-text-muted);
      max-width: 480px;
      margin-bottom: 2rem;
    }
    .construction-note {
      display: inline-block;
      background: #fff7ed;
      border: 1px solid #fed7aa;
      color: #9a3412;
      padding: 0.75rem 1.25rem;
      border-radius: var(--radius-sm);
      font-size: 0.95rem;
      margin-bottom: 2rem;
    }
    .construction-footer {
      margin-top: 3rem;
      font-size: 0.85rem;
      color: var(--color-text-muted);
    }
    .construction-footer a {
      color: var(--color-primary);
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main class="construction-page">
    <img src="/logo.svg" alt="abivio" class="construction-logo">
    <div class="construction-icon">🚧</div>
    <h1>Wir bauen gerade etwas für dich.</h1>
    <p>
      abivio wird die smarte Studienempfehlung für Abiturienten in Deutschland.
      Schau bald wieder vorbei.
    </p>
    <p class="construction-note">
      Geplante Features: Quiz, Bewerbungsfristen-Countdown & Uni-Empfehlungen.
    </p>
    <div class="construction-footer">
      <p>&copy; 2026 abivio.de</p>
      <p>
        <a href="/impressum.html">Impressum</a> · <a href="/datenschutz.html">Datenschutz</a>
      </p>
    </div>
  </main>

  <!-- Cloudflare Web Analytics -->
  <script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "DEIN_TOKEN"}'></script>
  <!-- End Cloudflare Web Analytics -->
</body>
</html>
