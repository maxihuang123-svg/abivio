<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>abivio — Bald verfügbar</title>
  <meta name="description" content="abivio wird gerade überarbeitet. Schau bald wieder vorbei, um dein passendes Studium zu finden.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    .construction-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem 1.25rem;
      background: linear-gradient(180deg, var(--color-surface) 0%, var(--color-bg) 100%);
    }

    .construction-logo {
      height: 48px;
      width: auto;
      margin-bottom: 2rem;
    }

    .construction-card {
      background: #fff;
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      padding: clamp(2rem, 6vw, 3.5rem);
      max-width: 560px;
      width: 100%;
      box-shadow: var(--shadow-lg);
    }

    .construction-card h1 {
      font-size: clamp(1.5rem, 5vw, 2rem);
      font-weight: 800;
      margin: 0 0 1rem;
      color: var(--color-text);
    }

    .construction-card p {
      color: var(--color-text-muted);
      font-size: 1.05rem;
      margin: 0 0 1.5rem;
      line-height: 1.6;
    }

    .construction-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--color-accent);
      color: var(--color-primary-dark);
      font-weight: 600;
      font-size: 0.85rem;
      padding: 0.5rem 0.9rem;
      border-radius: 999px;
      margin-bottom: 1.5rem;
    }

    .construction-badge::before {
      content: '';
      width: 8px;
      height: 8px;
      background: var(--color-primary);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .construction-footer {
      margin-top: 2rem;
      font-size: 0.85rem;
      color: var(--color-text-muted);
    }

    .construction-footer a {
      color: var(--color-primary);
      text-decoration: none;
    }

    .construction-footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <main class="construction-page">
    <img src="/logo-icon.png" alt="abivio" class="construction-logo">

    <div class="construction-card">
      <div class="construction-badge">Wird überarbeitet</div>
      <h1>Bald geht es weiter</h1>
      <p>
        abivio wird gerade für das kommende Semester aufgebaut. Wir arbeiten im Hintergrund an besseren Daten und einer zuverlässigeren Studienempfehlung.
      </p>
      <p>
        Schau in Kürze wieder vorbei.
      </p>
    </div>

    <div class="construction-footer">
      <a href="/impressum.html">Impressum</a> · <a href="/datenschutz.html">Datenschutz</a>
    </div>
  </main>
</body>
</html>
